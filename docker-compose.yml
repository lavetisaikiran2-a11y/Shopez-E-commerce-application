version: '3.8'

services:
  # 1. Express Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb+srv://<username>:<password>@cluster.mongodb.net/shopez?retryWrites=true&w=majority
      - JWT_SECRET=shopez_fallback_secret_key_change_me
    restart: always

  # 2. Python Flask AI Recommendation Service
  ai_service:
    build:
      context: ./ai_module
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    restart: always

  # 3. React Vite Nginx Frontend Client
  frontend:
    build:
      context: ./ShopEZ
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
      - ai_service
    restart: always
